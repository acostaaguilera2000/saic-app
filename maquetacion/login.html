<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SAIC</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- estilos del login personalizados-->
  <link rel="stylesheet" href="./estilos/login.css">
</head>

<body>
  <!-- Capa azul -->
  <div class="overlay"></div>

  <!-- Menú superior -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#"><i class="bi bi-shield-lock"></i> SAIC</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Tarjeta de login -->
  <div class="login-card opacity-75">
    <h4 class="text-center mb-4 fw-bold text-light">Iniciar Sesión</h4>
    <form>
      <div class="mb-3">
        <label for="email" class="form-label text-light"><i class="bi bi-envelope"></i> Correo electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="usuario@gmail.com" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label text-light"><i class="bi bi-lock"></i> Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="********" required>
      </div>
      <button type="submit" class="btn btn-login w-100"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
    </form>
    <div class="text-center mt-3">
      <a href="#" class="text-decoration-none"><i class="bi bi-key"></i> ¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
